stages:
  - test
  - build
  - scan
  - push
  - deploy

variables:
  AWS_DEFAULT_REGION: us-east-1
  DOCKER_DRIVER: overlay2

.backend_changes: &backend_changes
  changes:
    - Application-Code/backend/**/*
    - Application-Code/backend/Dockerfile

.frontend_changes: &frontend_changes
  changes:
    - Application-Code/frontend/**/*
    - Application-Code/frontend/Dockerfile

.k8s_changes: &k8s_changes
  changes:
    - Kubernetes-Manifests-file/**/*

backend:lint:
  stage: test
  image: node:20-alpine
  rules:
    - <<: *backend_changes
  script:
    - cd Application-Code/backend
    - npm ci || npm install
    - node --check index.js

frontend:lint:
  stage: test
  image: node:20-alpine
  rules:
    - <<: *frontend_changes
  script:
    - cd Application-Code/frontend
    - npm ci || npm install
    - npm run build --if-present

backend:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - <<: *backend_changes
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd Application-Code/backend
    - docker build -t $ECR_REGISTRY/backend:$CI_COMMIT_SHORT_SHA .
    - docker save $ECR_REGISTRY/backend:$CI_COMMIT_SHORT_SHA -o backend-image.tar
  artifacts:
    paths:
      - Application-Code/backend/backend-image.tar
    expire_in: 1 hour

frontend:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - <<: *frontend_changes
  script:
    - cd Application-Code/frontend
    - docker build -t $ECR_REGISTRY/frontend:$CI_COMMIT_SHORT_SHA .
    - docker save $ECR_REGISTRY/frontend:$CI_COMMIT_SHORT_SHA -o frontend-image.tar
  artifacts:
    paths:
      - Application-Code/frontend/frontend-image.tar
    expire_in: 1 hour

trivy:backend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  rules:
    - <<: *backend_changes
  script:
    - trivy fs --severity HIGH,CRITICAL Application-Code/backend
  allow_failure: true

backend:push:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - <<: *backend_changes
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker load -i Application-Code/backend/backend-image.tar
  script:
    - docker push $ECR_REGISTRY/backend:$CI_COMMIT_SHORT_SHA
    - docker tag $ECR_REGISTRY/backend:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/backend:latest
    - docker push $ECR_REGISTRY/backend:latest

frontend:push:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - <<: *frontend_changes
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker load -i Application-Code/frontend/frontend-image.tar
  script:
    - docker push $ECR_REGISTRY/frontend:$CI_COMMIT_SHORT_SHA
    - docker tag $ECR_REGISTRY/frontend:$CI_COMMIT_SHORT_SHA $ECR_REGISTRY/frontend:latest
    - docker push $ECR_REGISTRY/frontend:latest

update-manifests:
  stage: deploy
  image: alpine/git:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      <<: *k8s_changes
  script:
    - apk add --no-cache sed
    - sed -i "s|image:.*backend:.*|image: ${ECR_REGISTRY}/backend:${CI_COMMIT_SHORT_SHA}|" Kubernetes-Manifests-file/Backend/deployment.yaml
    - sed -i "s|image:.*frontend:.*|image: ${ECR_REGISTRY}/frontend:${CI_COMMIT_SHORT_SHA}|" Kubernetes-Manifests-file/Frontend/deployment.yaml
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    - git add Kubernetes-Manifests-file/
    - git diff --staged --quiet || git commit -m "ci: update image tags to ${CI_COMMIT_SHORT_SHA}"
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
